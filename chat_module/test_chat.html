<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrisisBridge Chat Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; flex-grow: 1; width: 100%; }
        #log { flex-grow: 1; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: #fafafa; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 6px; }
        .msg.guest { background: #e3f2fd; align-self: flex-start; border-left: 4px solid #2196f3; }
        .msg.staff { background: #f1f8e9; align-self: flex-end; border-left: 4px solid #4caf50; }
        .msg.system { background: #fff3e0; font-style: italic; font-size: 0.9em; text-align: center; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        button { padding: 10px 20px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background: #1976d2; }
        .setup { display: flex; gap: 10px; margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📡 CrisisBridge Live Chat Tester</h2>
    
    <!-- Setup Area -->
    <div class="setup">
        <input id="session_id" placeholder="Session ID (from Swagger /chat/start)" value="">
        <input id="sender_id" placeholder="Your Name" value="User_1">
        <select id="role">
            <option value="guest">Guest</option>
            <option value="staff">Staff</option>
        </select>
        <button onclick="connect()">Connect</button>
    </div>

    <!-- Chat Log -->
    <div id="log">
        <div class="msg system">Not connected. Paste a Session ID and click Connect.</div>
    </div>

    <!-- Message Input -->
    <div class="input-area">
        <input type="text" id="message" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let ws;

    function connect() {
        const sid = document.getElementById('session_id').value;
        const name = document.getElementById('sender_id').value;
        const role = document.getElementById('role').value;

        if (!sid) { alert("Please enter a Session ID first!"); return; }

        const url = `ws://localhost:8002/ws/chat/${sid}?sender_id=${name}&sender_role=${role}`;
        ws = new WebSocket(url);

        ws.onopen = () => {
            appendLog('system', `Connected as ${role} (${name})`);
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log("Received:", data);

            if (data.event === 'message') {
                appendLog(data.sender_role, `<strong>${data.sender_id}:</strong> ${data.message}`);
            } else if (data.event === 'history') {
                data.messages.forEach(m => {
                    appendLog(m.sender_role, `<strong>${m.sender_id}:</strong> ${m.message} <small>(history)</small>`);
                });
            } else {
                appendLog('system', data.message || data.event);
            }
        };

        ws.onclose = () => {
            appendLog('system', 'Disconnected from server.');
        };

        ws.onerror = (err) => {
            appendLog('system', 'WebSocket Error. Is the server running on port 8002?');
        };
    }

    function sendMessage() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert("Not connected!");
            return;
        }
        const input = document.getElementById('message');
        const msg = input.value;
        if (!msg) return;

        const payload = {
            message: msg
        };
        ws.send(JSON.stringify(payload));
        input.value = '';
    }

    function appendLog(role, html) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = html;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }
</script>

</body>
</html>
